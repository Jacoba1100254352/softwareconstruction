name: Blind Chess Bot

on:
  push:
    paths:
      - "blind-chess-bot/**"
      - ".github/workflows/blind-chess-bot.yml"
  pull_request:
    paths:
      - "blind-chess-bot/**"
      - ".github/workflows/blind-chess-bot.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blind-chess-bot
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: ./mvnw -B test
